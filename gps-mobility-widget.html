<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xMap GPS Mobility Live</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: transparent;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const urlTheme = new URLSearchParams(window.location.search).get('theme');
    const INIT_DARK = urlTheme === 'dark';

    const HOTSPOTS = [
      { cx: 270, cy: 340, label: 'Times Square',  rx: 110, ry: 75  },
      { cx: 560, cy: 380, label: 'SoHo',          rx: 105, ry: 70  },
      { cx: 820, cy: 270, label: 'Grand Central', rx:  90, ry: 60  },
      { cx: 155, cy: 470, label: 'W.Square Park', rx:  80, ry: 55  },
      { cx: 920, cy: 470, label: 'LES',           rx:  80, ry: 55  },
    ];

    // Scattered people particles (fixed positions, animated along axes)
    const PARTICLES = [
      {x:120,y:200},{x:330,y:220},{x:500,y:160},{x:770,y:235},{x:1040,y:235},
      {x:115,y:355},{x:390,y:355},{x:660,y:315},{x:930,y:355},{x:115,y:475},
      {x:330,y:530},{x:880,y:475},{x:1150,y:475},{x:695,y:615},{x:330,y:675},
    ];

    function Widget() {
      const [dark, setDark] = useState(INIT_DARK);
      const [tick, setTick] = useState(0);

      useEffect(() => {
        const id = setInterval(() => setTick(t => t + 1), 80);
        return () => clearInterval(id);
      }, []);

      useEffect(() => {
        const handler = e => {
          if (e.data?.type === 'xmap-set-theme') setDark(e.data.theme === 'dark');
        };
        window.addEventListener('message', handler);
        return () => window.removeEventListener('message', handler);
      }, []);

      useEffect(() => {
        const report = () => {
          try { window.parent.postMessage({ type: 'xmap-resize', height: document.body.scrollHeight }, '*'); } catch(e) {}
        };
        report();
        new ResizeObserver(report).observe(document.body);
      }, []);

      // Time of day cycles 07:00 → 22:00 and loops
      const timeHour    = Math.floor(((tick * 0.05) % 16) + 7);
      const timeStr     = `${String(timeHour).padStart(2,'0')}:00`;
      const intensity   = Math.sin((timeHour - 7) * Math.PI / 16); // 0 at edges, 1 at peak (midday)

      const warm        = dark ? '#F59E0B' : '#B45309';
      const bg          = dark ? '#0D0D11' : '#FFFFFF';
      const border      = dark ? '#27272A' : '#E4E4E7';
      const gridLine    = dark ? '#1C1C22' : '#E2E2E8';
      const labelColor  = dark ? '#52525B' : '#A1A1AA';
      const counterBg   = dark ? 'rgba(10,10,11,0.88)' : 'rgba(255,255,255,0.95)';
      const tagBg       = dark ? '#B45309' : '#B45309';

      // SVG canvas: 1160 × 740
      const W = 1160, H = 740;
      // Grid: 7 cols × 5 rows
      const cols = [0, 166, 332, 498, 664, 830, 996, 1160];
      const rows = [0, 148, 296, 444, 592, 740];

      return (
        <div style={{
          width: '100%', height: '100vh',
          background: bg,
          border: `1px solid ${border}`,
          borderRadius: 8,
          overflow: 'hidden',
          transition: 'background 0.3s, border-color 0.3s',
        }}>
          <svg
            viewBox={`0 0 ${W} ${H}`}
            style={{ width: '100%', height: '100%', display: 'block' }}
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              {HOTSPOTS.map((h, i) => (
                <radialGradient key={i} id={`fg${i}`} cx="50%" cy="50%" r="50%">
                  <stop offset="0%"   stopColor={warm} stopOpacity={0.55 * intensity + 0.08}/>
                  <stop offset="60%"  stopColor={warm} stopOpacity={0.22 * intensity + 0.03}/>
                  <stop offset="100%" stopColor={warm} stopOpacity="0"/>
                </radialGradient>
              ))}
            </defs>

            {/* Vertical grid lines */}
            {cols.map((x, i) =>
              <line key={`v${i}`} x1={x} y1="0" x2={x} y2={H}
                stroke={gridLine} strokeWidth="1.5"/>
            )}
            {/* Horizontal grid lines */}
            {rows.map((y, i) =>
              <line key={`h${i}`} x1="0" y1={y} x2={W} y2={y}
                stroke={gridLine} strokeWidth="1.5"/>
            )}

            {/* Heat blobs */}
            {HOTSPOTS.map((h, i) => {
              const breathe = 1 + Math.sin(tick * 0.025 + i * 0.8) * 0.12 * intensity;
              return (
                <ellipse key={i}
                  cx={h.cx} cy={h.cy}
                  rx={h.rx * breathe} ry={h.ry * breathe}
                  fill={`url(#fg${i})`}
                />
              );
            })}

            {/* Moving people particles along grid roads */}
            {Array.from({ length: 20 }, (_, i) => {
              const onRow  = i % 2 === 0;
              const rowIdx = Math.floor(i / 4) % 5;
              const colIdx = Math.floor(i / 3) % 7;
              const speed  = 0.6 + (i % 3) * 0.4;
              const t      = ((tick * speed * 0.008 + i * 0.19) % 1);
              const rev    = i % 3 === 0;
              const cx = onRow ? (rev ? (1-t)*W : t*W) : cols[colIdx];
              const cy = onRow ? rows[rowIdx]           : (rev ? (1-t)*H : t*H);
              return (
                <circle key={i} cx={cx} cy={cy} r={4}
                  fill={warm}
                  opacity={0.45 + intensity * 0.45}/>
              );
            })}

            {/* Static scatter dots */}
            {PARTICLES.map((p, i) => {
              const pulse = 0.4 + Math.sin(tick * 0.05 + i * 0.7) * 0.35;
              return <circle key={i} cx={p.x} cy={p.y} r={5} fill={warm} opacity={pulse}/>;
            })}

            {/* Hotspot labels */}
            {HOTSPOTS.map((h, i) => (
              <text key={i}
                x={h.cx} y={h.cy + h.ry * 1.15 + 18}
                textAnchor="middle"
                fontFamily="JetBrains Mono, monospace"
                fontSize="22"
                fill={labelColor}
              >{h.label}</text>
            ))}

            {/* TIME OF DAY counter — top left */}
            <rect x="20" y="20" width="280" height="80" rx="6"
              fill={counterBg} stroke={border} strokeWidth="1.5"/>
            <text x="38" y="52"
              fontFamily="JetBrains Mono, monospace" fontSize="18"
              fill={labelColor} letterSpacing="0.08em">TIME OF DAY</text>
            <text x="38" y="88"
              fontFamily="JetBrains Mono, monospace" fontSize="34"
              fill={warm} fontWeight="500" letterSpacing="0.04em">{timeStr}</text>

            {/* GPS MOBILITY · LIVE badge — bottom right */}
            <rect x={W - 310} y={H - 70} width="290" height="48" rx="6" fill={tagBg}/>
            <circle cx={W - 290} cy={H - 46} r="7"  fill="#fff" opacity="0.9"/>
            <circle cx={W - 290} cy={H - 46} r="3.5" fill={tagBg}/>
            <text x={W - 272} y={H - 39}
              fontFamily="JetBrains Mono, monospace" fontSize="20"
              fill="#fff" fontWeight="500" letterSpacing="0.06em">GPS MOBILITY · LIVE</text>
          </svg>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Widget/>);
  </script>
</body>
</html>
