<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; overflow: hidden; }
</style>
</head><body>
<canvas id="c" width="272" height="110" style="display:block"></canvas>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const COLOR = '#A78BFA';

// Scattered parcel dots across Houston grid
const PARCELS = [
  {x:30,  y:22}, {x:72,  y:18}, {x:118, y:25}, {x:160, y:15}, {x:205, y:20}, {x:248, y:18},
  {x:20,  y:50}, {x:58,  y:55}, {x:100, y:48}, {x:145, y:52}, {x:190, y:45}, {x:238, y:50},
  {x:35,  y:80}, {x:82,  y:85}, {x:128, y:78}, {x:172, y:82}, {x:220, y:75}, {x:258, y:80},
  {x:50,  y:100},{x:105, y:95}, {x:155, y:100},{x:200, y:95},
];

// Flood zone: ellipse roughly center-right
const FZ = { cx: 155, cy: 60, rx: 90, ry: 45 };

function inFlood(p) {
  const dx = (p.x - FZ.cx) / FZ.rx;
  const dy = (p.y - FZ.cy) / FZ.ry;
  return dx * dx + dy * dy <= 1;
}

const AT_RISK = PARCELS.filter(inFlood);
const SAFE    = PARCELS.filter(p => !inFlood(p));

let tick = 0;
// stagger reveal
let revealed = 0;

function draw() {
  ctx.clearRect(0, 0, 272, 110);

  // Flood zone fill
  ctx.beginPath();
  ctx.ellipse(FZ.cx, FZ.cy, FZ.rx, FZ.ry, 0, 0, Math.PI * 2);
  ctx.fillStyle = COLOR;
  ctx.globalAlpha = 0.07 + Math.sin(tick * 0.04) * 0.02;
  ctx.fill();
  ctx.strokeStyle = COLOR;
  ctx.globalAlpha = 0.25;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 3]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Safe parcels
  SAFE.forEach((p, i) => {
    const show = tick > i * 1.5;
    if (!show) return;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = COLOR;
    ctx.globalAlpha = 0.35;
    ctx.fill();
  });

  // At-risk parcels — flagged with brighter color
  AT_RISK.forEach((p, i) => {
    const delay = SAFE.length * 1.5 + i * 3;
    const show = tick > delay;
    if (!show) return;
    const pulse = 0.8 + Math.sin(tick * 0.07 + i * 1.2) * 0.2;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4.5, 0, Math.PI * 2);
    ctx.fillStyle = COLOR;
    ctx.globalAlpha = pulse;
    ctx.fill();
    // glow ring
    ctx.beginPath();
    ctx.arc(p.x, p.y, 7, 0, Math.PI * 2);
    ctx.strokeStyle = COLOR;
    ctx.globalAlpha = 0.25 * pulse;
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  ctx.globalAlpha = 1;
  tick++;
  if (tick > 160) tick = 30; // loop from after initial reveal
  requestAnimationFrame(draw);
}

draw();
</script>
</body></html>
