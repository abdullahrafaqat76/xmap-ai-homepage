<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; overflow: hidden; }
</style>
</head><body>
<canvas id="c" width="272" height="110" style="display:block"></canvas>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const COLOR = '#FB923C';

// 8 bars representing scored addresses, heights vary
const BARS = [
  { x: 28,  h: 52, w: 24 },
  { x: 60,  h: 30, w: 20 },
  { x: 88,  h: 62, w: 24 },
  { x: 118, h: 44, w: 20 },
  { x: 146, h: 70, w: 28 }, // top 1
  { x: 182, h: 38, w: 20 },
  { x: 210, h: 55, w: 24 },
  { x: 242, h: 48, w: 22 },
];
const TOP5 = new Set([0, 2, 4, 6, 7]); // highlighted

let tick = 0;
const BASE_Y = 95;

function draw() {
  ctx.clearRect(0, 0, 272, 110);

  BARS.forEach((bar, i) => {
    const grow = Math.min(1, (tick - i * 4) / 20);
    if (grow <= 0) return;
    const h = bar.h * grow;
    const isTop = TOP5.has(i);
    const alpha = isTop ? 0.85 : 0.35;

    ctx.fillStyle = COLOR;
    ctx.globalAlpha = alpha;
    // subtle pulse on top 5
    if (isTop) {
      const pulse = 1 + Math.sin(tick * 0.06 + i) * 0.04;
      ctx.globalAlpha = alpha * pulse;
    }
    ctx.beginPath();
    ctx.roundRect(bar.x - bar.w / 2, BASE_Y - h, bar.w, h, 2);
    ctx.fill();
  });

  // score label on tallest bar
  const growMain = Math.min(1, (tick - 4 * 4) / 20);
  if (growMain > 0.8) {
    ctx.globalAlpha = (growMain - 0.8) / 0.2;
    ctx.fillStyle = COLOR;
    ctx.font = '500 9px JetBrains Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('#1', 146, BASE_Y - BARS[4].h * growMain - 5);
  }

  ctx.globalAlpha = 1;
  tick++;
  // loop after full reveal
  if (tick > 120) tick = 0;
  requestAnimationFrame(draw);
}

draw();
</script>
</body></html>
