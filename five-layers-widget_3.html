<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xMap Five Layers</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: transparent;
      /* NOT overflow:hidden — let height grow naturally for responsive */
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const urlTheme = new URLSearchParams(window.location.search).get('theme');
    const INIT_DARK = urlTheme === 'dark';

    const LAYERS = [
      { num:'01', label:'POI',          color:'#7DD3FC', desc:'Every place, indexed and structured. 300M+ globally.',              snippet:"poi.search(near=parcel, radius_m=500)",            mini:'dots'  },
      { num:'02', label:'Car Traffic',  color:'#F59E0B', desc:'Vehicle flow, road density, congestion - hourly resolution.',       snippet:"traffic.flow(segment_id, window='7d')",           mini:'flow'  },
      { num:'03', label:'GPS Mobility', color:'#34D399', desc:'Origin, destination, dwell time - aggregated from mobile signals.', snippet:"mobility.foot_traffic(parcel, window='30d')",     mini:'arcs'  },
      { num:'04', label:'Parcel',       color:'#A78BFA', desc:"Who owns it, what it's worth - full ownership and value history.",  snippet:"parcel.query(id, include=['ownership','value'])", mini:'rects' },
      { num:'05', label:'Demographics', color:'#F472B6', desc:'Population, income, age, household composition at block level.',    snippet:"demo.profile(geo, level='block_group')",          mini:'bands' },
    ];

    function hexRgb(hex) {
      const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
      return `${r},${g},${b}`;
    }

    // Breakpoints
    const BP_WIDE   = 860; // side-by-side
    const BP_MEDIUM = 540; // single col, full SVG
    // below 540 = mobile: SVG + stacked list

    function Widget() {
      const [dark, setDark]          = useState(INIT_DARK);
      const [tick, setTick]          = useState(0);
      const [activeLayer, setActive] = useState(null);
      const [width, setWidth]        = useState(window.innerWidth);
      const rootRef                  = useRef(null);

      // Track container width (not window — iframe width)
      useEffect(() => {
        const ro = new ResizeObserver(entries => {
          for (const e of entries) setWidth(e.contentRect.width);
        });
        if (rootRef.current) ro.observe(rootRef.current);
        return () => ro.disconnect();
      }, []);

      useEffect(() => {
        const id = setInterval(() => setTick(t => t + 1), 80);
        return () => clearInterval(id);
      }, []);

      useEffect(() => {
        const handler = e => {
          if (e.data?.type === 'xmap-set-theme') setDark(e.data.theme === 'dark');
        };
        window.addEventListener('message', handler);
        return () => window.removeEventListener('message', handler);
      }, []);

      // Report height to parent after each render
      useEffect(() => {
        const report = () => {
          try {
            window.parent.postMessage({
              type: 'xmap-resize',
              height: document.documentElement.scrollHeight
            }, '*');
          } catch(e) {}
        };
        report();
      });

      const isWide   = width >= BP_WIDE;
      const isMobile = width < BP_MEDIUM;

      const bg            = dark ? '#0A0A0B' : '#FAFAF9';
      const accent        = dark ? '#7DD3FC' : '#0369A1';
      const textPrimary   = dark ? '#F5F5F4' : '#18181B';
      const textSecondary = dark ? '#A1A1AA' : '#52525B';
      const textMuted     = dark ? '#52525B' : '#A1A1AA';
      const divider       = dark ? '#1C1C21' : '#ECECF0';

      // SVG geometry
      const SVG_W = 640, SVG_H = 432;
      const BEAM_X = 82;
      const LX = 34, LW = 572, LH = 56, LGAP = 68, LY0 = 88;
      const pulseR = 16 + Math.sin(tick * 0.06) * 4;
      const scanY  = LY0 + ((tick * 0.012) % 1) * (LGAP * 4 + LH);

      function miniViz(layer, y) {
        const { mini, color } = layer;
        if (mini === 'dots') {
          const pts = [[262,12],[290,6],[320,24],[350,8],[378,18],[408,10],[436,26],[466,6],[494,18],[522,10]];
          return pts.map(([cx, cy], j) => (
            <circle key={j} cx={cx} cy={y+cy} r={3.5} fill={color}
              opacity={0.55 + Math.sin(tick*0.07 + j*0.8)*0.4}/>
          ));
        }
        if (mini === 'flow') {
          return [0, 1, 2].map(j => {
            const px = LX + 230 + ((tick * 1.8 + j * 100) % 350);
            return <circle key={j} cx={px > LX+LW-12 ? LX+230 : px} cy={y+LH*0.28+j*LH*0.23} r={3.5} fill={color} opacity="0.9"/>;
          });
        }
        if (mini === 'arcs') {
          return [[258,LH-4,400,10],[296,LH-4,464,14],[270,LH-4,532,8]].map(([x1,y1o,x2,y2o], j) => (
            <path key={j}
              d={`M${x1},${y+y1o} Q${(x1+x2)/2+20},${y+y2o} ${x2},${y+y2o}`}
              fill="none" stroke={color} strokeWidth="1.5" opacity="0.65" strokeDasharray="3 2"/>
          ));
        }
        if (mini === 'rects') {
          return [[262,6,52,LH-12],[320,6,40,LH-12],[366,6,56,LH-12],[428,6,42,LH-12],[476,6,54,LH-12]].map(([rx,ry,rw,rh], j) => (
            <rect key={j} x={rx} y={y+ry} width={rw} height={rh} rx="2" fill={color} opacity={[0.6,0.3,0.5,0.25,0.45][j]}/>
          ));
        }
        if (mini === 'bands') {
          return [[258,8,96,LH-16],[360,8,108,LH-16],[474,8,84,LH-16]].map(([rx,ry,rw,rh], j) => (
            <rect key={j} x={rx} y={y+ry} width={rw} height={rh} rx="2" fill={color} opacity={[0.55,0.3,0.45][j]}/>
          ));
        }
        return null;
      }

      const SVGPanel = (
        <div style={{ width: '100%' }}>
          <svg viewBox={`0 0 ${SVG_W} ${SVG_H}`} style={{ width:'100%', height:'auto', display:'block' }}>
            <defs>
              <filter id="lglow">
                <feGaussianBlur stdDeviation="4" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="aglow">
                <feGaussianBlur stdDeviation="7" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>

            {/* AI Agent orb */}
            <circle cx={BEAM_X} cy={36} r={pulseR} fill="none" stroke={accent} strokeWidth="1" opacity="0.18"/>
            <circle cx={BEAM_X} cy={36} r={14} fill="none" stroke={accent} strokeWidth="1.5" opacity="0.6" filter="url(#aglow)"/>
            <circle cx={BEAM_X} cy={36} r={5} fill={accent}/>
            <text x={BEAM_X+22} y={31} fontFamily="JetBrains Mono,monospace" fontSize="9" fill={accent} letterSpacing="0.12em">AI AGENT</text>
            <text x={BEAM_X+22} y={44} fontFamily="JetBrains Mono,monospace" fontSize="8" fill={textMuted}>querying physical layers</text>

            {/* Vertical dashed beam */}
            <line x1={BEAM_X} y1={53} x2={BEAM_X} y2={SVG_H-10}
              stroke={accent} strokeWidth="1.5" strokeDasharray="5 4" opacity="0.4"/>

            {/* Scanning particle */}
            <circle cx={BEAM_X} cy={Math.max(53, Math.min(scanY, SVG_H-14))} r={4}
              fill={accent} filter="url(#lglow)"/>

            {/* Layer planes */}
            {LAYERS.map((layer, i) => {
              const y      = LY0 + i * LGAP;
              const active = activeLayer === layer.num;
              const planeBg = dark
                ? (active ? `rgba(${hexRgb(layer.color)},0.10)` : '#0D0D11')
                : (active ? `rgba(${hexRgb(layer.color)},0.07)` : '#F0F0EE');
              const planeBorder = active ? layer.color + '55' : (dark ? '#27272A' : '#E4E4E7');
              return (
                <g key={layer.num}
                  onClick={() => setActive(a => a === layer.num ? null : layer.num)}
                  style={{cursor:'pointer'}}>
                  <rect x={LX} y={y} width={LW} height={LH} rx="3"
                    fill={planeBg} stroke={planeBorder} strokeWidth="1"/>
                  <circle cx={BEAM_X} cy={y+LH/2} r={7}
                    fill={layer.color} filter="url(#lglow)" opacity="0.9"/>
                  <text x={BEAM_X+16} y={y+20}
                    fontFamily="JetBrains Mono,monospace" fontSize="8.5"
                    fill={textMuted} letterSpacing="0.08em">{layer.num}</text>
                  <text x={BEAM_X+16} y={y+39}
                    fontFamily="Inter,sans-serif" fontSize="14"
                    fill={textPrimary} fontWeight="500">{layer.label}</text>
                  {miniViz(layer, y)}
                  {active && (
                    <text x={LX+LW-8} y={y+LH/2+4}
                      fontFamily="JetBrains Mono,monospace" fontSize="10"
                      fill={layer.color} textAnchor="end" opacity="0.85">{layer.snippet}</text>
                  )}
                </g>
              );
            })}
          </svg>
        </div>
      );

      const ListPanel = (
        <div style={{ paddingTop: isWide ? 8 : 0 }}>
          {LAYERS.map((layer) => {
            const active = activeLayer === layer.num;
            return (
              <div key={layer.num}
                onMouseEnter={() => setActive(layer.num)}
                onMouseLeave={() => setActive(null)}
                onClick={() => setActive(a => a === layer.num ? null : layer.num)}
                style={{
                  padding: isMobile ? '14px 0' : '20px 0',
                  borderBottom: `1px solid ${divider}`,
                  opacity: activeLayer && !active ? 0.3 : 1,
                  transition: 'opacity 0.25s ease',
                  cursor: 'pointer',
                }}>
                <div style={{display:'flex', gap:10, alignItems:'center', marginBottom:5}}>
                  <div style={{width:8, height:8, borderRadius:'50%', background:layer.color, flexShrink:0}}/>
                  <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:9, letterSpacing:'0.1em', color:layer.color}}>{layer.num}</span>
                  <span style={{fontFamily:"'Inter',sans-serif", fontSize: isMobile ? 14 : 15, fontWeight:500, color:textPrimary}}>{layer.label}</span>
                </div>
                <p style={{
                  fontSize: isMobile ? 12.5 : 13.5,
                  lineHeight:1.55, color:textSecondary,
                  margin:'0 0 5px', fontFamily:"'Inter',sans-serif"
                }}>{layer.desc}</p>
                <div style={{
                  fontFamily:"'JetBrains Mono',monospace",
                  fontSize: isMobile ? 10 : 11,
                  color: layer.color,
                  opacity: active ? 1 : 0,
                  transition: 'opacity 0.2s',
                  height: 18,
                  overflow: 'hidden',
                  textOverflow: 'ellipsis',
                  whiteSpace: 'nowrap',
                }}>agent.tool({layer.snippet})</div>
              </div>
            );
          })}
        </div>
      );

      // Padding scales with width
      const pad = isMobile ? 16 : isWide ? 32 : 24;

      return (
        <div ref={rootRef} style={{
          background: bg,
          width: '100%',
          padding: pad,
          transition: 'background 0.3s',
        }}>
          {isWide ? (
            // ── Wide: side by side ──────────────────────────────
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:48, alignItems:'start' }}>
              {SVGPanel}
              {ListPanel}
            </div>
          ) : (
            // ── Narrow / Mobile: stacked ─────────────────────────
            <div style={{ display:'flex', flexDirection:'column', gap: isMobile ? 20 : 28 }}>
              {SVGPanel}
              {ListPanel}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Widget/>);
  </script>
</body>
</html>
