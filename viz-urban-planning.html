<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; overflow: hidden; }
</style>
</head><body>
<canvas id="c" width="272" height="110" style="display:block"></canvas>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const COLOR = '#86EFAC';

// 20 intersections ranked by conflict score
const BARS = [
  {h:82},{h:76},{h:70},{h:66},{h:62},  // top 5 (worst)
  {h:58},{h:54},{h:50},{h:47},{h:44},
  {h:41},{h:38},{h:36},{h:34},{h:32},
  {h:30},{h:28},{h:26},{h:24},{h:22},
];

const BAR_W = 9;
const GAP   = 4;
const START_X = 14;
const BASE_Y  = 98;
const TOP5 = 5; // first 5 are "worst" / highlighted

let tick = 0;

function draw() {
  ctx.clearRect(0, 0, 272, 110);

  BARS.forEach((bar, i) => {
    const grow = Math.min(1, Math.max(0, (tick - i * 3) / 18));
    if (grow <= 0) return;

    const x = START_X + i * (BAR_W + GAP);
    const h = bar.h * grow;
    const isWorst = i < TOP5;

    ctx.beginPath();
    ctx.roundRect(x, BASE_Y - h, BAR_W, h, [2, 2, 0, 0]);
    ctx.fillStyle = COLOR;
    ctx.globalAlpha = isWorst ? 0.9 : 0.35;
    ctx.fill();

    // Animated scan highlight sweeping across top 5
    if (isWorst) {
      const scanI = Math.floor((tick * 0.06) % TOP5);
      if (scanI === i) {
        ctx.beginPath();
        ctx.roundRect(x - 1, BASE_Y - h - 1, BAR_W + 2, h + 2, [2, 2, 0, 0]);
        ctx.strokeStyle = COLOR;
        ctx.globalAlpha = 0.6;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }
  });

  // Threshold line
  const lineReveal = Math.min(1, tick / 30);
  if (lineReveal > 0) {
    const threshY = BASE_Y - 50;
    ctx.beginPath();
    ctx.moveTo(START_X, threshY);
    ctx.lineTo(START_X + BARS.length * (BAR_W + GAP) * lineReveal, threshY);
    ctx.strokeStyle = COLOR;
    ctx.globalAlpha = 0.3;
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.globalAlpha = 1;
  tick++;
  if (tick > 180) tick = 20;
  requestAnimationFrame(draw);
}

draw();
</script>
</body></html>
